name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm typecheck

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://stub:stub@stub.example.com/stub?sslmode=require
          AUTH_SECRET: ci-stub-secret
          ENCRYPTION_KEY: 0000000000000000000000000000000000000000000=
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: "1"

  runtime:
    name: runtime — lint & import
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runtime/requirements.txt

      - run: pip install -r requirements.txt

      - name: Syntax check
        run: python -c "import ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('app').rglob('*.py')]"

      - name: Import smoke test
        env:
          DATABASE_URL: postgresql://stub:stub@stub.example.com/stub?sslmode=require
          ENCRYPTION_KEY: 0000000000000000000000000000000000000000000=
          ANTHROPIC_API_KEY: sk-ant-stub
        run: python -c "from app import main, brain, memory, tenants, crypto; from app.providers import whapi, meta, twilio; print('imports ok')"
