name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm typecheck

      - run: pnpm build
        env:
          DATABASE_URL: postgresql://stub:stub@stub.example.com/stub?sslmode=require
          AUTH_SECRET: ci-stub-secret
          ENCRYPTION_KEY: 0000000000000000000000000000000000000000000=
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SKIP_ENV_VALIDATION: "1"

  runtime:
    name: runtime — lint & import
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: runtime/requirements.txt

      - run: pip install -r requirements.txt

      - name: Syntax check
        run: python -c "import ast, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('app').rglob('*.py')]"

      - name: Import smoke test
        env:
          DATABASE_URL: postgresql://stub:stub@stub.example.com/stub?sslmode=require
          ENCRYPTION_KEY: 0000000000000000000000000000000000000000000=
          ANTHROPIC_API_KEY: sk-ant-stub
        run: python -c "from app import main, brain, memory, tenants, crypto, rate_limit, logging_config, renderer, ordering, outbound_throttle, agent_tools; from app.providers import whapi, meta, twilio, evolution; print('imports ok')"

  e2e:
    name: e2e — playwright
    runs-on: ubuntu-latest
    needs: [web]
    # Sólo corre si los secrets están configurados (evita fallar el PR en forks)
    if: ${{ github.event_name == 'push' || github.repository_owner == 'Bonets-grill' }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          AUTH_RESEND_KEY: ""
          AUTH_EMAIL_FROM: noreply@ci.local
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          RUNTIME_URL: http://localhost:8000
          RUNTIME_INTERNAL_SECRET: ci-internal
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ALLOW_DEV_LOGIN: "1"
          SUPER_ADMIN_EMAIL: e2e-admin@ci.ordychat.local
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7
