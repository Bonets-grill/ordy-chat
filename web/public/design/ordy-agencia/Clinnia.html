<style>/* Ordy-AgencIA — Design System */

:root {
  /* Type */
  --font-display: 'Instrument Serif', 'IBM Plex Serif', Georgia, serif;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  /* Light mode — warm off-white palette */
  --bg: #f6f4ef;
  --bg-elev: #fbfaf6;
  --bg-card: #ffffff;
  --ink: #171614;
  --ink-2: #4a463f;
  --ink-3: #807a70;
  --ink-4: #b8b2a6;
  --line: #e6e2d8;
  --line-strong: #d6d1c4;

  /* Accent — warm olive / moss */
  --accent-h: 120;
  --accent: oklch(0.55 0.09 var(--accent-h));
  --accent-soft: oklch(0.92 0.04 var(--accent-h));
  --accent-ink: oklch(0.35 0.08 var(--accent-h));

  --warn: oklch(0.68 0.15 60);
  --danger: oklch(0.58 0.18 25);

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --shadow-sm: 0 1px 0 rgba(23, 22, 20, 0.04), 0 1px 2px rgba(23, 22, 20, 0.04);
  --shadow: 0 1px 0 rgba(23, 22, 20, 0.04), 0 8px 24px -8px rgba(23, 22, 20, 0.12);
  --shadow-lg: 0 24px 60px -20px rgba(23, 22, 20, 0.25);

  --density: 1;
}

[data-theme='dark'] {
  --bg: #14130f;
  --bg-elev: #1b1a15;
  --bg-card: #1f1e19;
  --ink: #f2efe6;
  --ink-2: #cdc8bb;
  --ink-3: #8f897c;
  --ink-4: #5a5449;
  --line: #2b2924;
  --line-strong: #3a372f;

  --accent: oklch(0.72 0.11 var(--accent-h));
  --accent-soft: oklch(0.28 0.06 var(--accent-h));
  --accent-ink: oklch(0.88 0.08 var(--accent-h));

  --shadow-sm: 0 1px 0 rgba(0, 0, 0, 0.4);
  --shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 24px 60px -20px rgba(0, 0, 0, 0.6);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'ss01', 'cv11';
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }

/* Type */
.display {
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
}
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.caps {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: calc(10px * var(--density)) calc(16px * var(--density));
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s ease;
  border: 1px solid transparent;
  white-space: nowrap;
  user-select: none;
}
.btn-primary {
  background: var(--ink);
  color: var(--bg);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-accent {
  background: var(--accent);
  color: var(--bg);
}
.btn-accent:hover { transform: translateY(-1px); }
.btn-ghost {
  border-color: var(--line-strong);
  background: var(--bg-elev);
}
.btn-ghost:hover { background: var(--bg-card); border-color: var(--ink-3); }
.btn-link {
  color: var(--ink-2);
  padding: 6px 0;
}
.btn-link:hover { color: var(--ink); }

/* Inputs */
.input, .textarea, .select {
  width: 100%;
  padding: calc(10px * var(--density)) calc(14px * var(--density));
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--ink);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
  outline: none;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.textarea { min-height: 80px; resize: vertical; font-family: inherit; }
.label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--ink-2);
}

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg-elev);
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.badge-accent {
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-color: transparent;
}
.badge-dot::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--accent);
  display: inline-block;
}

/* Divider */
.hr {
  height: 1px;
  background: var(--line);
  border: 0;
  margin: 0;
}

/* Tweaks panel */
.tweaks-panel {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 280px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  font-size: 13px;
  display: none;
}
.tweaks-panel.visible { display: block; }
.tweaks-panel h4 {
  margin: 0 0 12px;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 400;
}
.tweaks-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 6px 0;
}
.tweaks-row label { color: var(--ink-2); font-size: 12px; }
.tweaks-swatches { display: flex; gap: 6px; }
.tweaks-sw {
  width: 20px;
  height: 20px;
  border-radius: 999px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s ease;
}
.tweaks-sw:hover { transform: scale(1.1); }
.tweaks-sw.active { border-color: var(--ink); }
.tweaks-seg {
  display: inline-flex;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px;
}
.tweaks-seg button {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  color: var(--ink-3);
}
.tweaks-seg button.active {
  background: var(--bg-card);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

/* Utility */
.row { display: flex; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; } .gap-8 { gap: 32px; }
.grow { flex: 1; }
.center { align-items: center; justify-content: center; }
.between { justify-content: space-between; }

/* Placeholder pattern */
.placeholder {
  background:
    repeating-linear-gradient(
      135deg,
      transparent 0 10px,
      rgba(23, 22, 20, 0.03) 10px 11px
    ),
    var(--bg-elev);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Grid paper bg */
.grid-bg {
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 40px 40px;
  background-position: -1px -1px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* Anim */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease both; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.pulse { animation: pulse 2s ease-in-out infinite; }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes edgeDash {
  to { stroke-dashoffset: -8; }
}

@keyframes wave {
  0%, 100% { transform: scaleY(0.35); }
  50% { transform: scaleY(1.4); }
}

.typing-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 999px;
  background: currentColor; opacity: 0.4; margin-left: 4px;
  animation: pulse 1s ease-in-out infinite;
}

@media (max-width: 900px) {
  .waiter-demo-grid { grid-template-columns: 1fr !important; }
  .waiter-demo-grid > div { height: 460px !important; }
}

/* Neon border — runs a bright hue around the prompt box */
@property --neon-angle {
  syntax: '<angle>';
  inherits: false;
  initial-value: 0deg;
}
@keyframes neonSpin {
  to { --neon-angle: 360deg; }
}
.neon-wrap::before,
.neon-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 2px;
  background: conic-gradient(
    from var(--neon-angle, 0deg),
    transparent 0deg,
    oklch(0.82 0.22 var(--neon-h1, 320)) 40deg,
    oklch(0.88 0.24 var(--neon-h2, 40)) 100deg,
    transparent 160deg,
    transparent 200deg,
    oklch(0.85 0.22 var(--neon-h3, 200)) 260deg,
    oklch(0.82 0.22 var(--neon-h1, 320)) 320deg,
    transparent 360deg
  );
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  animation: neonSpin 4s linear infinite;
  pointer-events: none;
}
.neon-wrap::after {
  padding: 0;
  inset: -6px;
  filter: blur(18px);
  opacity: 0.7;
  -webkit-mask: none;
  mask: none;
}
@supports not (background: conic-gradient(from 0deg, red, blue)) {
  .neon-wrap::before, .neon-wrap::after { display: none; }
}</style>
<script>/* ordy-system/theme.js
 * Runtime branding helpers. Consumed by any product HTML.
 *
 * Usage:
 *   script src="ordy-system/theme.js"
 *   OrdySystem.applyBrand({ name: 'Clinnia', accentH: 180, ... })
 */
(function (global) {
  const DEFAULT_BRAND = {
    id: 'ordy',
    name: 'Ordy·AgencIA',
    logoGlyph: 'ø',
    tagline: 'Infraestructura para agencias de IA.',
    accentH: 320,          // hue rotation for accent color (0-360)
    theme: 'dark',         // 'light' | 'dark'
    lang: 'es',            // 'es' | 'en'
    density: 'normal',     // 'compact' | 'normal' | 'spacious'
    fontDisplay: "'Instrument Serif', Georgia, serif",
    fontUi: "'Inter', system-ui, sans-serif",
    fontMono: "'JetBrains Mono', Menlo, monospace",
    neonHues: [320, 40, 200], // 3 hues that rotate around the prompt box
    // Copy overrides — merged into I18N[lang] at runtime
    copy: null,
    // Vertical config: what tabs/niches appear in the hero
    nicheTabs: null,
  };

  function applyBrand(brand) {
    const b = Object.assign({}, DEFAULT_BRAND, brand || {});
    const root = document.documentElement;
    root.setAttribute('data-theme', b.theme);
    root.style.setProperty('--accent-h', b.accentH);
    root.style.setProperty('--font-display', b.fontDisplay);
    root.style.setProperty('--font-ui', b.fontUi);
    root.style.setProperty('--font-mono', b.fontMono);
    const dens = { compact: 0.85, normal: 1, spacious: 1.15 }[b.density] || 1;
    root.style.setProperty('--density', dens);
    document.title = b.name + ' · ' + (b.tagline || '');
    global.__ORDY_BRAND__ = b;
    return b;
  }

  // Called by components to read current brand (set before App mounts)
  function brand() { return global.__ORDY_BRAND__ || DEFAULT_BRAND; }

  global.OrdySystem = { applyBrand, brand, DEFAULT_BRAND };
})(window);
</script>

];

  const [val, setVal] = useStateW(m.base);

    const id = setInterval(() => {

  return (
    <div style={{
      padding: '8px 12px',
      border: '1px solid var(--line)',

// Draw edges as SVG paths with flowing dashes when active
const NodeGraph = ({ activeNodes, activeEdges }) => {
  const byId = Object.fromEntries(NODES.map(n => [n.id, n]));

    <svg
      viewBox="0 0 100 100"
      preserveAspectRatio="none"

        <filter id="edge-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="0.6" />

        <radialGradient id="packet-grad">
          <stop offset="0%" stopColor="white" stopOpacity="1" />
          <stop offset="70%" stopColor="white" stopOpacity="0.3" />
          <stop offset="100%" stopColor="white" stopOpacity="0" />

      </defs>
      {EDGES.map(([a, b], i) => {
        const na = byId[a], nb = byId[b];
        if (!na || !nb) return null;
        const key = `${a}->${b}`;
        const isActive = activeEdges.has(key);
        const dx = nb.x - na.x;
        const cp1x = na.x + dx * 0.5;
        const cp1y = na.y;
        const cp2x = nb.x - dx * 0.5;
        const cp2y = nb.y;
        const d = `M ${na.x} ${na.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${nb.x} ${nb.y}`;
        const groupColor = NODE_GROUP_COLOR[nb.group] || 'var(--accent)';
        return (
          <g key={i}>
            <path id={`path-${i}`} d={d} fill="none" stroke="var(--line-strong)" strokeWidth="0.18" vectorEffect="non-scaling-stroke" />
            {isActive && (
              <>
                <path d={d} stroke={groupColor} strokeWidth="0.45" fill="none" opacity="0.9" vectorEffect="non-scaling-stroke" filter="url(#edge-glow)" />
                <path d={d} stroke={groupColor} strokeWidth="0.22" strokeDasharray="1.2 1.2" fill="none" vectorEffect="non-scaling-stroke" style={{ animation: 'edgeDash 1.1s linear infinite' }} />
                {/* Data packet traveling along path */}
                <circle r="0.9" fill={groupColor} filter="url(#edge-glow)">
                  <animateMotion dur="1.2s" repeatCount="indefinite" path={d} />
                </circle>
                <circle r="0.5" fill="white">
                  <animateMotion dur="1.2s" repeatCount="indefinite" path={d} />
                </circle>
              </>
            )}
          </g>
        );
      })}
    </svg>
  );
};

const WaiterDemo = () => {
  const app = useApp();
  const script = WAITER_SCRIPT[app.lang] || WAITER_SCRIPT.es;
  const [shown, setShown] = useStateW([]);   // messages already displayed
  const [typingIdx, setTypingIdx] = useStateW(-1);
  const [activeNodes, setActiveNodes] = useStateW(new Set());
  const [activeEdges, setActiveEdges] = useStateW(new Set());
  const scrollRef = useRefW(null);
  const tRef = useRefW([]);

  // Lifecycle: loop through the script
  useEffectW(() => {
    let cancelled = false;
    const clear = () => tRef.current.forEach(t => clearTimeout(t));
    const sched = (fn, ms) => { const t = setTimeout(fn, ms); tRef.current.push(t); return t; };

    function runStep(i) {
      if (cancelled) return;
      if (i >= script.length) {
        sched(() => {
          setShown([]); setActiveNodes(new Set()); setActiveEdges(new Set());
          sched(() => runStep(0), 800);
        }, 2800);
        return;
      }
      const msg = script[i];
      const isBot = msg.role === 'bot';

      // Trigger node activation
      const nodes = new Set(['whatsapp', ...msg.nodes, isBot ? 'out' : 'intent']);
      setActiveNodes(nodes);
      // Edges: activate any edge whose both endpoints are in nodes
      const edges = new Set();
      EDGES.forEach(([a, b]) => { if (nodes.has(a) && nodes.has(b)) edges.add(`${a}->${b}`); });
      setActiveEdges(edges);

      if (isBot) {
        // Show typing indicator first
        setTypingIdx(i);
        setShown(prev => [...prev, { ...msg, text: '' }]);
        sched(() => {
          if (cancelled) return;
          setShown(prev => prev.map((m, idx) => idx === i ? msg : m));
          setTypingIdx(-1);
          sched(() => runStep(i + 1), 2400);
        }, 1100);
      } else {
        setShown(prev => [...prev, msg]);
        sched(() => runStep(i + 1), 2000);
      }
    }

    runStep(0);
    return () => { cancelled = true; clear(); };
    // eslint-disable-next-line
  }, [app.lang]);

    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;

                { n: 'Google Calendar',d: 'events.insert',                  s: 'desconectado' },
                { n: 'Webhook custom', d: 'POST https://…',                 s: 'conectado' },

<script type="text/babel">const { useState, useEffect } = React;

const App = () => {
  const AppContext = window.AppContext;
  const { Landing, Signup, Dashboard, Builder, NewAgentModal, TweaksPanel } = window;
  // Persistent nav state
  const [route, setRoute] = useState(() => localStorage.getItem('ordy_route') || 'landing');
  const [signupData, setSignupData] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ordy_signup') || 'null'); } catch { return null; }
  });
  const [activeAgent, setActiveAgent] = useState(() => localStorage.getItem('ordy_agent') || null);
  const [newAgentOpen, setNewAgentOpen] = useState(false);

  // Tweakable state
  const [lang, setLang]       = useState(TWEAK_DEFAULTS.lang);
  const [theme, setTheme]     = useState(TWEAK_DEFAULTS.theme);
  const [accentH, setAccentH] = useState(TWEAK_DEFAULTS.accentH);
  const [density, setDensity] = useState(TWEAK_DEFAULTS.density);
  const [landingVariant, setLandingVariant] = useState(TWEAK_DEFAULTS.landingVariant);
  const [editMode, setEditMode] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.style.setProperty('--accent-h', String(accentH));
    document.documentElement.style.setProperty('--density', density === 'compact' ? '0.82' : '1');
  }, [theme, accentH, density]);

  useEffect(() => { localStorage.setItem('ordy_route', route); }, [route]);
  useEffect(() => { if (signupData) localStorage.setItem('ordy_signup', JSON.stringify(signupData)); }, [signupData]);
  useEffect(() => { if (activeAgent) localStorage.setItem('ordy_agent', activeAgent); }, [activeAgent]);

  // Edit-mode host protocol
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const appCtx = {
    lang, theme, accentH, density, landingVariant, editMode,
    set: (patch) => {
      if ('lang' in patch) setLang(patch.lang);
      if ('theme' in patch) setTheme(patch.theme);
      if ('accentH' in patch) setAccentH(patch.accentH);
      if ('density' in patch) setDensity(patch.density);
      if ('landingVariant' in patch) setLandingVariant(patch.landingVariant);
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
    },
  };

  const navigate = (to) => {
    setRoute(to);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const onOpenAgent = (id) => {
    if (id === 'new') {
      setNewAgentOpen(true);
    } else {
      setActiveAgent(id);
      navigate('builder');
    }
  };

  const onCreateAgent = ({ name, template }) => {
    setActiveAgent('new_' + Date.now());
    setNewAgentOpen(false);
    navigate('builder');
  };

  return (
    <AppContext.Provider value={appCtx}>
      {route === 'landing'   && <Landing onNav={navigate} />}
      {route === 'signup'    && <Signup onNav={navigate} onComplete={(d) => { setSignupData(d); navigate('dashboard'); }} />}
      {route === 'dashboard' && <Dashboard onNav={navigate} signupData={signupData} onOpenAgent={onOpenAgent} />}
      {route === 'builder'   && <Builder onNav={navigate} agentId={activeAgent} agentName={activeAgent && activeAgent.startsWith('new_') ? null : undefined} />}

      {newAgentOpen && <NewAgentModal onClose={() => setNewAgentOpen(false)} onCreate={onCreateAgent} />}

      {/* Floating route jumper (always visible — helps user move around the prototype) */}
      <div style={{
        position: 'fixed', bottom: 20, left: 20, zIndex: 80,
        background: 'var(--bg-card)',
        border: '1px solid var(--line-strong)',
        borderRadius: 999,
        padding: 4,
        display: 'inline-flex', gap: 2,
        boxShadow: 'var(--shadow)',
        fontSize: 11,
      }}>
        {[
          { k: 'landing',   l: lang === 'es' ? 'Landing'   : 'Landing' },
          { k: 'signup',    l: lang === 'es' ? 'Signup'    : 'Signup' },
          { k: 'dashboard', l: lang === 'es' ? 'Dashboard' : 'Dashboard' },
          { k: 'builder',   l: lang === 'es' ? 'Builder'   : 'Builder' },
        ].map(r => (
          <button key={r.k}
            onClick={() => { if (r.k === 'builder' && !activeAgent) setActiveAgent('ag_01'); navigate(r.k); }}
            style={{
              padding: '6px 12px',
              borderRadius: 999,
              background: route === r.k ? 'var(--ink)' : 'transparent',
              color: route === r.k ? 'var(--bg)' : 'var(--ink-2)',
              fontSize: 11,
              fontFamily: 'var(--font-mono)',
              letterSpacing: '0.05em',
              textTransform: 'uppercase',
            }}
          >{r.l}</button>
        ))}
      </div>

      <TweaksPanel />
    </AppContext.Provider>
  );
};

function mount() {
  if (!window.AppContext || !window.Landing || !window.Signup || !window.Dashboard || !window.Builder) {
    return setTimeout(mount, 40);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
mount();</script>
</body></html>
